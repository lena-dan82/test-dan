<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
        {% block title %}

        {% endblock %}
    </title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>

<header class="bg-dark text-white py-3">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center">
      <!-- Логотип или название сайта -->
      <h1 class="h4 mb-0">
        <a href="#" class="text-white text-decoration-none">Лунопедия</a>
      </h1>

      <!-- Навигационные кнопки -->
      <nav>
        <a href=".." class="btn btn-outline-light btn-sm me-2">Главная</a>
        <a href="../blog" class="btn btn-outline-light btn-sm me-2">Блог</a>
        <a href="#" class="btn btn-outline-light btn-sm me-2">Топ 100</a>
        <a href="#" class="btn btn-outline-light btn-sm">Поиск</a>
      </nav>
    </div>
  </div>
</header>



    {% block content %}

    {% endblock %}



<!-- Футер -->
<footer class="bg-dark text-white py-4 mt-auto">
    <div class="container d-flex justify-content-between align-items-center flex-wrap">
        <p>© 2026 Никакие права не защищены.</p>
        <ul class="list-unstyled d-flex gap-3 mb-0">
            <li><a href="#" class="text-white"><i class='bi bi-envelope'></i> info@example.com</a></li>
            <li><a href="#" class="text-white"><i class='bi bi-telephone'></i> +7 (999) 123-45-67</a></li>
        </ul>
        <ul class="list-unstyled d-flex gap-3 mb-0">
            <li><a href="#" class="text-white"><i class='bi bi-instagram'></i></a></li>
            <li><a href="#" class="text-white"><i class='bi bi-vk'></i></a></li>
            <li><a href="#" class="text-white"><i class='bi bi-twitter'></i></a></li>
        </ul>
    </div>
</footer>

<!-- Bootstrap JS и зависимости -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

</body>
</html>

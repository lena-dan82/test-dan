<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Текущие дата и время</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        #time {
            font-size: 2em;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <h1>Текущие дата и время:</h1>
    <div id="time"></div>

    <script>
        function updateTime() {
            const now = new Date();
            const options = {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const formatted = now.toLocaleString('ru-RU', options);
            document.getElementById('time').textContent = formatted;
        }

        // Обновляем время сразу и далее каждую секунду
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
